<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Kinux // Engineering Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        body { background: #050505; color: #a1a1aa; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { background: #080808; border-right: 1px solid #141414; }
        .active-link { color: #d8b4fe; border-left: 3px solid #a855f7; background: rgba(168, 85, 247, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-80 h-full p-6 overflow-y-auto hidden md:block">
        <h2 class="text-white font-black text-xs mb-8 tracking-[0.2em] px-2 opacity-50">KİNUX // MÜHENDİSLİK_50</h2>
        <nav id="nav-list" class="space-y-1"></nav>
    </aside>

    <main class="flex-1 p-20 overflow-y-auto">
        <div class="max-w-3xl">
            <h1 id="title" class="text-4xl font-bold text-white mb-8">Kinux Teknik Wiki</h1>
            <div id="desc" class="text-lg opacity-70 leading-relaxed italic">
                Sol menüden mühendislik detaylarına dalın.
            </div>
        </div>
    </main>

    <script>
        const faqList = [
            {q: "Kinux'u 'Kinux' Yapan Nedir?", a: "Windows'un hantal yapısını kökünden kazıyıp, donanımı doğrudan işlemciye bağlayan bir köprü olması."},
            {q: "Neden Popüler Olmalı?", a: "Oyuncuların yıllardır aradığı o saf performansı milisaniyeler içinde sunması."},
            {q: "Neden Ücretli?", a: "Çünkü her Windows güncellemesinde kendini yenileyen bir mühendislik ürünü."},
            {q: "Kinux bir virüs mü?", a: "Hayır, sistem parazitlerini temizleyen bir panzehir."},
            {q: "Ban riski var mı?", a: "Hayır, oyun dosyasına değil OS ayarına dokunuyoruz."},
            {q: "Core Parking Bypass nedir?", a: "CPU çekirdeklerini uyutmayı (park) engelleyerek anlık performansı sabitler."},
            {q: "DPC Latency spikeleri?", a: "Driverların işlemciyi meşgul etmesini engelleyerek görüntü takılmalarını bitirir."},
            {q: "USB Polling Rate optimizasyonu?", a: "Mouse'un anakartla konuşma hızını 1ms'ye (1000Hz) kilitler."},
            {q: "Telemetri neden siliniyor?", a: "Microsoft'un senin verilerini işleyip CPU'yu yormasını engellemek için."},
            {q: "Nagle Algoritması iptali?", a: "Ağ paketlerini biriktirip gönderen Nagle'ı kapatıp gerçek zamanlı iletim sağlar."},
            {q: "Pagefile konumu neden önemli?", a: "Diskin en hızlı sektörüne sabitleyerek takas süresini kısaltır."},
            {q: "MMCSS (Multimedya) önceliği?", a: "Ses ve görüntü işlemlerini CPU'da en ön sıraya alır."},
            {q: "Sistem güncellemeleri neden kapalı?", a: "Windows her güncellemede ince ayarlarımızı bozduğu için."},
            {q: "Power Plan: Ultimate nedir?", a: "Windows'un gizli performans planını aktif eder."},
            {q: "Interrupt Affinity Policy?", a: "Kesmeleri oyunun kullanmadığı çekirdeklere atar."},
            {q: "I/O Scheduling (Deadline)?", a: "Disk okuma/yazma sırasını oyun öncelikli yapılandırır."},
            {q: "LargeSystemCache?", a: "RAM'deki önbellek miktarını oyun için agresif şekilde artırır."},
            {q: "Direct Flip Mode?", a: "Görüntü çıkışındaki DWM gecikmesini minimize eder."},
            {q: "TcpAckFrequency (0x1)?", a: "Her ağ paketini bekletmeden anında onaylatır."},
            {q: "SystemResponsiveness değeri?", a: "Sistem tepkisini oyuna %100 öncelik verecek şekilde ayarlar."},
            {q: "BIOS/UEFI Uyumu?", a: "Kinux, Windows üstü ayar olduğu için her BIOS ile tam uyumlu çalışır."},
            {q: "Sober/Roblox optimizasyonu?", a: "Sober'ın Linux/Windows köprüsündeki latency'yi düşürür."},
            {q: "Laptop ısınması artar mı?", a: "İşlemci tam kapasite çalıştığı için evet, ama FPS stabilliği buna değer."},
            {q: "Registry Bloom nedir?", a: "Kayıt defterindeki şişkinliği temizleyerek OS'in daha hızlı yanıt vermesini sağlar."},
            {q: "Boot süresi neden kısaldı?", a: "Gereksiz servis yüklemelerini kaldırdık."},
            {q: "Mouse hızlanması (Accel) durumu?", a: "Kinux, Windows'un o 'hızlandırma' filtresini kaldırıp raw input sağlar."},
            {q: "Neden Iris Xe kullanıcıları?", a: "Entegre grafik birimi CPU'ya yüklendiği için CPU optimizasyonu onlarda 2x etkili."},
            {q: "GPU MPO Disable?", a: "Görüntüdeki siyah ekran hatalarını ve input lag'i keser."},
            {q: "Disk Indexing neden kapalı?", a: "Diski sürekli tarayıp yormasını engellemek için."},
            {q: "Process Priority?", a: "Oyunun .exe dosyasını CPU scheduler'da en üste taşır."},
            {q: "Kernel Timer Resolution?", a: "Zaman ölçümü hassasiyetini 0.5ms'ye çeker."},
            {q: "Memory Compression disable?", a: "CPU'nun RAM verisini sıkıştırmasını kapatıp doğrudan erişim sağlar."},
            {q: "Background Apps kill?", a: "Arka planda çalışan her şeyi askıya alır."},
            {q: "Audio Latency (Exclusive)?", a: "Ses kartının diğer uygulamalarca bölünmesini engeller."},
            {q: "Flow Control (NIC)?", a: "Gereksiz ağ akış trafiğini kapatır."},
            {q: "L3 Cache Prefetching?", a: "İşlemcinin veri tahmin algoritmasını hızlandırır."},
            {q: "LazyWriter ayarı?", a: "Verinin diske yazılma bekleme süresini minimize eder."},
            {q: "Task Offload (NIC)?", a: "Ağ kartının iş yükünü CPU'ya geri döndürür (daha hızlıdır)."},
            {q: "Kernel Patch Protection?", a: "Performansı kısıtlayan gereksiz güvenlik kontrollerini dengeler."},
            {q: "GDI Rendering?", a: "Windows'un arayüz çizimini hızlandırır."},
            {q: "UserPort Limit?", a: "Aynı anda kurulan bağlantı sayısını 65535'e çeker."},
            {q: "Idle Priority?", a: "Sistem boştayken bile oyunu öncelikli tutar."},
            {q: "LargeSendOffload (LSO)?", a: "Büyük paketleri parçalayıp iletim hızını artırır."},
            {q: "DNS Cache?", a: "Sorgu hızını minimize etmek için önbellek artışı."},
            {q: "Shell Hardware Detection?", a: "USB takıldığında oluşan 'donma'yı engeller."},
            {q: "Display Latency?", a: "Frame'in ekrana çıkışındaki o milisaniyelik boşluğu kapatır."},
            {q: "Driver Loading Order?", a: "Sürücülerin yüklenme sırasını oyun için optimize eder."},
            {q: "Page Table?", a: "Adresleme hatalarını önleyip RAM'e doğrudan erişim sağlar."},
            {q: "System Faults?", a: "Bellek hatalarını minimize eden flag'ler ekler."},
            {q: "Final Kinux Bench?", a: "Zero Latency hedefi için yapılan tüm mühendisliğin özeti."}
        ];

        const nav = document.getElementById('nav-list');
        faqList.forEach((item, i) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left px-4 py-3 rounded-sm transition-all hover:bg-white/5 flex gap-4 items-center";
            btn.innerHTML = `<span class="opacity-30 font-mono text-[10px]">${i < 9 ? '0'+(i+1) : i+1}</span> <span class="text-xs">${item.q}</span>`;
            btn.onclick = () => {
                document.getElementById('title').innerText = item.q;
                document.getElementById('desc').innerHTML = `<p class="text-xl text-white font-medium">${item.a}</p>`;
                document.querySelectorAll('button').forEach(b => b.classList.remove('active-link'));
                btn.classList.add('active-link');
            };
            nav.appendChild(btn);
        });
    </script>
</body>
</html>
